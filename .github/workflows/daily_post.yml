name: Daily Blog Post

on:
  schedule:
    # UTC 시간 기준 (KST = UTC + 9)
    - cron: '0 23 * * *'  # KST 오전 8시 (UTC 23:00 전날)
    - cron: '0 10 * * *'  # KST 오후 7시 (UTC 10:00)
  workflow_dispatch:  # 수동 실행 가능

jobs:
  trigger-workflow:
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger Streamlit Workflow
        env:
          STREAMLIT_APP_URL: ${{ secrets.STREAMLIT_APP_URL }}
        run: |
          echo "🚀 Triggering automatic blog workflow..."
          
          # Streamlit 앱에 자동 주제로 워크플로우 시작 요청
          curl -s -o /dev/null -w "%{http_code}" \
            "${STREAMLIT_APP_URL}?action=start&topic=auto" || true
          
          echo "✅ Trigger sent successfully!"
          echo "📧 승인 요청이 이메일/텔레그램으로 전송됩니다."
